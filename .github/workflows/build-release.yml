name: Build And Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            goos: windows
            goarch: amd64
            output: awan-installer-windows-amd64.exe
            built_binary: build/bin/AWaN-Installer.exe
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            output: awan-installer-linux-amd64
            built_binary: build/bin/AWaN-Installer

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Wails desktop builds on Linux need WebKit/GTK development packages.
      - name: Install Linux desktop dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libappindicator3-dev
          sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev

      - name: Install dependencies
        run: go mod tidy

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.9.1

      - name: Build application on Windows
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $gopath = go env GOPATH
          $env:PATH = "$gopath\bin;$env:PATH"
          wails build -s -clean -platform windows/amd64
          Copy-Item "build/bin/AWaN-Installer.exe" "dist/awan-installer-windows-amd64.exe"

      - name: Build application on Linux
        if: matrix.goos == 'linux'
        shell: bash
        run: |
          mkdir -p dist
          export PATH="$(go env GOPATH)/bin:$PATH"
          wails build -s -clean -platform ${{ matrix.goos }}/${{ matrix.goarch }}
          cp "${{ matrix.built_binary }}" "dist/${{ matrix.output }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-windows
          path: dist

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-linux
          path: dist

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: auto-${{ github.run_number }}
          RELEASE_NAME: Build ${{ github.run_number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if gh release view "$TAG_NAME" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/*.exe dist/*linux* --clobber --repo "$REPO"
          else
            gh release create "$TAG_NAME" \
              dist/*.exe \
              dist/*linux* \
              --title "$RELEASE_NAME" \
              --notes "Automated build for run ${{ github.run_number }}" \
              --target "${{ github.sha }}" \
              --repo "$REPO"
          fi
